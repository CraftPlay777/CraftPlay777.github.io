<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>~*~ Juha's Page ~*~</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #236bcd;
      background-image: radial-gradient(ellipse at top, #3a8ee6 0%, #1a5aaa 60%, #0d3d7a 100%);
      font-family: "Tahoma", "Verdana", sans-serif;
      font-size: 13px;
      min-height: 100vh;
      padding: 16px;
    }
    .taskbar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 36px;
      background: linear-gradient(to bottom, #245edb 0%, #1a3fa0 4%, #2255c8 6%, #1e4fc0 45%, #1a3fa0 50%, #163590 100%);
      border-top: 2px solid #5b8fe8;
      display: flex;
      align-items: center;
      padding: 0 4px;
      z-index: 100;
    }
    .taskbar-time {
      margin-left: auto;
      color: white;
      font-size: 12px;
      background: linear-gradient(to bottom, #1a3fa0, #163590);
      border: 1px inset #1230a0;
      padding: 2px 10px;
      height: 28px;
      display: flex;
      align-items: center;
    }
    .window {
      max-width: 600px;
      margin: 0 auto 50px;
      border: 2px solid #1230a0;
      border-radius: 6px 6px 0 0;
      box-shadow: 2px 2px 8px #00000066, inset 0 0 0 1px #6fa8f0;
      overflow: hidden;
    }
    .titlebar {
      background: linear-gradient(to bottom, #4a90e2 0%, #1a5acd 40%, #1648b8 60%, #2060d8 100%);
      padding: 5px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid #1230a0;
    }
    .titlebar-title {
      color: white;
      font-weight: bold;
      font-size: 12px;
      text-shadow: 1px 1px 2px #00000088;
      flex: 1;
    }
    .titlebar-btns { display: flex; gap: 2px; }
    .tbtn {
      width: 21px; height: 21px;
      border-radius: 3px;
      border: 1px solid #1230a0;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white;
    }
    .tbtn.min, .tbtn.max { background: linear-gradient(to bottom, #6aabff, #3878d8); }
    .tbtn.cls { background: linear-gradient(to bottom, #f06060, #c02020); }
    .window-body { background: #ece9d8; }
    .layout { display: flex; min-height: 340px; }
    .sidebar {
      width: 140px;
      background: linear-gradient(to bottom, #4a7fd4, #2255b0);
      padding: 10px 0;
      flex-shrink: 0;
      border-right: 1px solid #1a3fa0;
    }
    .sidebar-title {
      color: #c8e0ff;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 10px 6px;
      border-bottom: 1px solid #3a6ec0;
      margin-bottom: 6px;
    }
    .sidebar a {
      display: block;
      color: #e8f4ff;
      text-decoration: none;
      font-size: 12px;
      padding: 5px 10px;
    }
    .sidebar a:hover { background: #1a3fa0; color: white; }
    .sidebar a.active { background: #1a3fa0; color: white; font-weight: bold; }
    .content { flex: 1; padding: 14px; }
    .profile-header {
      background: linear-gradient(to right, #1e5acd, #3a7ae0);
      color: white;
      padding: 10px 14px;
      border-radius: 3px;
      margin-bottom: 12px;
      border: 1px solid #1230a0;
    }
    .profile-header h1 { font-size: 18px; font-weight: bold; text-shadow: 1px 1px 2px #000a; }
    .profile-header p { font-size: 11px; color: #c8e0ff; margin-top: 2px; }
    .statusbar {
      background: #ece9d8;
      border-top: 1px solid #aca899;
      padding: 2px 8px;
      font-size: 11px;
      color: #444;
      display: flex;
      justify-content: space-between;
    }
    .statusbar-panel { border: 1px inset #aca899; padding: 0 6px; }
  </style>
</head>
<body>
<div class="window">
  <div class="titlebar">
    <div style="font-size:14px;">🌐</div>
    <span class="titlebar-title">Juha's Page — Microsoft Internet Explorer</span>
    <div class="titlebar-btns">
      <div class="tbtn min">_</div>
      <div class="tbtn max">□</div>
      <div class="tbtn cls">✕</div>
    </div>
  </div>
  <div class="window-body">
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-title">Navegación</div>
        <a href="/" class="active">🏠 Inicio</a>
        <a href="/infome">👤 Sobre mí</a>
        <a href="/links">🔗 Links</a>
        <a href="/proyectos">📁 Proyectos</a>
        <a href="/contacto">📬 Contacto</a>
      </div>
      <div class="content">
        <div class="profile-header">
          <h1>Hola, soy Juha</h1>
          <p>CraftPlay777 · Desarrollador · Profesor · Real no fake</p>
        </div>
      </div>
    </div>
  </div>
  <div class="statusbar">
    <span class="statusbar-panel">Listo</span>
    <span class="statusbar-panel">Visitas: no disponible actualmente</span>
    <span class="statusbar-panel">© 2026 Juha (CraftPlay777)</span>
  </div>
</div>
<div class="taskbar">
  <div class="taskbar-time" id="clock">00:00</div>
</div>
<script>
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
<audio id="click-sound" src="https://cdn.freesound.org/previews/678/678248_7806746-lq.mp3"></audio>
<script>
  const sound = document.getElementById('click-sound');
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('click', () => {
      sound.currentTime = 0;
      sound.play();
    });
  });
</script>

</body>
</html>
