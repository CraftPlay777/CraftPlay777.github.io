<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Juha</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      color: #c8c8c8;
      font-family: "Courier New", monospace;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .titulo {
      text-align: center;
      color: #ffffff;
      font-size: 18px;
      margin-bottom: 2rem;
    }

    .menu-item {
      margin-bottom: 0.6rem;
    }

    .toggle {
      background: none;
      border: none;
      color: #c8c8c8;
      font-family: "Courier New", monospace;
      font-size: 14px;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toggle:hover { color: #ffffff; }

    .toggle .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
      color: #555;
    }

    .toggle.open .arrow { transform: rotate(90deg); color: #888; }

    .submenu {
      display: none;
      margin-top: 0.3rem;
      margin-left: 1.2rem;
      border-left: 1px solid #2a2a2a;
      padding-left: 1rem;
    }

    .submenu.visible { display: block; }

    .submenu a, .submenu span {
      display: block;
      color: #777;
      text-decoration: none;
      font-size: 13px;
      padding: 2px 0;
    }

    .submenu a:hover { color: #ffffff; }

    .submenu .pending {
      color: #444;
      font-style: italic;
      font-size: 12px;
      padding-left: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="titulo">Hola :)</div>

  <!-- Luanti -->
  <div class="menu-item">
    <button class="toggle" onclick="toggle(this)">
      <span class="arrow">▶</span> Luanti
    </button>
    <div class="submenu">
      <a href="/bugs">&gt; Reporta Bugs</a>
      <a href="/sugerencias">&gt; Sugerencias</a>
      <a href="/ideas">&gt; Ideas</a>
    </div>
  </div>

  <!-- Redes -->
  <div class="menu-item">
    <button class="toggle" onclick="toggle(this)">
      <span class="arrow">▶</span> Redes
    </button>
    <div class="submenu">
      <a href="https://github.com/CraftPlay777/" target="_blank">&gt; GitHub</a>
      <a href="https://youtube.com/@themtlua" target="_blank">&gt; YouTube</a>
      <a href="https://vm.tiktok.com/ZS92N5xM4RdHh-fuN2J/" target="_blank">&gt; TikTok</a>
    </div>
  </div>

  <!-- Contacto -->
  <div class="menu-item">
    <button class="toggle" onclick="toggle(this)">
      <span class="arrow">▶</span> Contacto
    </button>
    <div class="submenu">
      <span>&gt; Discord</span>
      <span class="pending">// luego lo ponemos</span>
      <span>&gt; Zangi</span>
      <span class="pending">// luego lo ponemos</span>
      <span>&gt; Correo</span>
      <span class="pending">// luego lo ponemos</span>
    </div>
  </div>

</div>

<script>
  function toggle(btn) {
    btn.classList.toggle('open');
    btn.nextElementSibling.classList.toggle('visible');
  }
</script>
</body>
  </html>
